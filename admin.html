<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Control</title>

<style>
body{
margin:0;
font-family:Jumble;
background-image:url("img2.jpeg");
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.container{
width:420px;
padding:30px;
border-radius:25px;
text-align:center;
background:linear-gradient(135deg,rgba(0,80,255,0.15),rgba(0,0,60,0.1));
backdrop-filter:blur(18px);
border:1px solid #66ccff;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}
input,select{
width:90%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:10px;
}
.btn{
display:block;
width:100%;
margin:8px 0;
padding:15px;
border-radius:40px;
color:white;
background:linear-gradient(90deg,#0000FF,#0099FF);
border:2px solid #66ccff;
cursor:pointer;
}
.playlist{
color:white;
text-align:left;
margin-top:15px;
max-height:160px;
overflow:auto;
}
.del{
color:red;
cursor:pointer;
margin-left:8px;
font-weight:bold;
}
.liveBox{
margin-top:20px;
padding:15px;
border-radius:15px;
background:rgba(0,0,0,0.35);
color:white;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2 style="color:white;">Admin Quiz Control</h2>

<input id="q" placeholder="Întrebarea">
<input id="a" placeholder="Varianta A">
<input id="b" placeholder="Varianta B">
<input id="c" placeholder="Varianta C">

<select id="correct">
<option value="A">Răspuns corect: A</option>
<option value="B">Răspuns corect: B</option>
<option value="C">Răspuns corect: C</option>
</select>

<button class="btn" onclick="addQuestion()">➕ Adaugă</button>
<button class="btn" onclick="preview()">👁️ Preview</button>
<button class="btn" onclick="send()">▶️ NEXT</button>
<button class="btn" onclick="resetLive()">🔄 RESET</button>
<button class="btn" onclick="stopQuestion()">⛔ Pauza</button>

<div id="playlist" class="playlist"></div>

<div class="liveBox">
<b>LIVE:</b>
<div id="liveQuestion"></div>
<div id="liveCorrect"></div>
<div id="liveTimer"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

if(prompt("Introdu parola admin:")!=="catalin19"){
document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:40vh;'>Acces interzis</h1>";
throw new Error("Parola gresita");
}

const firebaseConfig={
apiKey:"APIKEYUL_TAU",
authDomain:"web-quiz-3eea6.firebaseapp.com",
databaseURL:"https://web-quiz-3eea6-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"web-quiz-3eea6"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let playlist=[];
let currentIndex=0;
let timerInterval=null;

const playlistDiv=document.getElementById("playlist");


// 🔥 PLAYLIST GLOBAL
db.ref("playlist").on("value",snap=>{
playlist = snap.val() || [];
renderPlaylist();
});

function renderPlaylist(){
playlistDiv.innerHTML="";
playlist.forEach((q,i)=>{
playlistDiv.innerHTML+=`${i+1}. ${q.question} (${q.correct})
<span class="del" onclick="deleteQuestion(${i})">❌</span><br>`;
});
}

function addQuestion(){

if(!q.value || !a.value || !b.value || !c.value){
alert("Completează toate câmpurile.");
return;
}

const newQ={
question:q.value,
options:{A:a.value,B:b.value,C:c.value},
correct:correct.value
};

playlist.push(newQ);

// 🔥 scriere sigură în Firebase
db.ref("playlist").set(playlist)
.then(()=>console.log("Salvat OK"))
.catch(err=>console.error(err));

q.value=a.value=b.value=c.value="";
}

function deleteQuestion(i){
playlist.splice(i,1);
db.ref("playlist").set(playlist);
}

function preview(){
if(!playlist.length){alert("Nu există întrebări.");return;}
alert(playlist[playlist.length-1].question);
}

let autoFlow = false;
let pauseTimeout = null;
let nextTimeout = null;
function send(){

clearInterval(timerInterval);

clearTimeout(pauseTimeout);
clearTimeout(nextTimeout);

// 🔥 dacă era oprit
if(!autoFlow){

autoFlow = true;

runQuestion();
return;
}

// 🔥 NEXT manual
runQuestion(true);

}

function runQuestion(forceNext = false){

  clearInterval(timerInterval);

clearTimeout(pauseTimeout);
clearTimeout(nextTimeout);

if(forceNext){
currentIndex++;
}
// dacă s-au terminat întrebările
if(currentIndex >= playlist.length){

db.ref("live").update({
finished:true,
paused:true
});

autoFlow = false;
return;
}

const qObj = playlist[currentIndex];

// 🔥 PORNEȘTE ÎNTREBAREA
db.ref("live").set({
question:qObj.question,
options:qObj.options,
correct:qObj.correct,
timer:20,
timerStart:Date.now(),
paused:false,
showCorrect:false,
votes:{A:0,B:0,C:0},
finished:false
});

let t = 20;

timerInterval = setInterval(()=>{

t--;

db.ref("live/timer").set(t);

// 🔥 când timpul expiră
if(t <= 0){

clearInterval(timerInterval);

// arată răspunsul corect
db.ref("live").update({
showCorrect:true
});

// 🔥 ține răspunsul 6 secunde
pauseTimeout = setTimeout(()=>{

// 🔥 intră în pauză
db.ref("live").update({
paused:true
});

nextTimeout = setTimeout(()=>{

runQuestion(true);

},5000);

},6000);

}

},1000);

}

function resetLive(){

currentIndex=0;

// reset live
db.ref("live").set({
paused:true,
finished:false,
question:"",
options:{},
votes:{A:0,B:0,C:0},
timer:0,
timerStart:null,
correct:""
});

// 🔥 RESET LEADERBOARD
db.ref("scores").remove();

}

function stopQuestion(){

// 🔥 oprește tot
clearInterval(timerInterval);

clearTimeout(pauseTimeout);
clearTimeout(nextTimeout);

// 🔥 dezactivează autoplay
autoFlow = false;

// 🔥 pune interfața pe pauză
db.ref("live").update({
paused:true
});

}

db.ref("live").on("value",snap=>{
const data=snap.val();
if(!data) return;
liveQuestion.innerText="Întrebare: "+(data.question||"");
liveCorrect.innerText=data.correct?"Corect: "+data.correct:"";
liveTimer.innerText=data.timer>=0?"Timer: "+data.timer+" sec":"";
});

</script>
</body>
</html>
